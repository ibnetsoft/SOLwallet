services:
  # ─── API Server (NestJS) ───
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: solwallet-server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production

  # ─── Mini App (Next.js) ───
  mini-app:
    build:
      context: .
      dockerfile: Dockerfile.mini-app
    container_name: solwallet-mini-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
      - NEXT_PUBLIC_TELEGRAM_BOT_USERNAME=${TELEGRAM_BOT_USERNAME}
      - NEXT_PUBLIC_MINI_APP_URL=${MINI_APP_URL}

  # ─── Admin Dashboard (Next.js) ───
  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    container_name: solwallet-admin
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=/api

  # ─── Nginx Reverse Proxy ───
  nginx:
    image: nginx:alpine
    container_name: solwallet-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - server
      - mini-app
      - admin

  # ─── Certbot (SSL renewal) ───
  certbot:
    image: certbot/certbot
    container_name: solwallet-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"